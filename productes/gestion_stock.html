<h1>Gestión de Stock</h1>
<table border="1">
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Precio</th>
      <th>Stock</th>
      <th>Acción</th>
    </tr>
  </thead>
  <tbody>
    {% for p in productos %}
    <tr>
      <td>{{ p.nombre }}</td>
      <td>{{ p.precio }}€</td>
      <td>{{ p.stock }}</td>
      <td><a href="{% url 'borrar' p.id %}">Eliminar</a></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
<br />
<a href="/admin">Ir al Panel de Control (Añadir más)</a>
