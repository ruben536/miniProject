{% extends 'base.html' %} {% block title %}Llista Productes{% endblock %} {%
block content %}
<h1>Productes</h1>

<a href="{% url 'producte_create' %}" class="btn btn-primary mb-3">
  Afegir Producte
</a>

<table class="table table-striped">
  <thead>
    <tr>
      <th>Nom</th>
      <th>Preu</th>
      <th>Proveïdor</th>
      <th>Accions</th>
    </tr>
  </thead>
  <tbody>
    {% for producte in productes %}
    <tr>
      <td>{{ producte.nom }}</td>
      <td>{{ producte.preu }}</td>
      <td>{{ producte.proveidor.nom }}</td>
      <td>
        <a
          href="{% url 'producte_update' producte.pk %}"
          class="btn btn-warning btn-sm"
          >Editar</a
        >
        <a
          href="{% url 'producte_delete' producte.pk %}"
          class="btn btn-danger btn-sm"
          >Eliminar</a
        >
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
